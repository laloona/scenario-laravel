name: CI

on:
  push:
  pull_request:

jobs:
  cs:
    name: CS (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.4'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, json, libxml, mbstring, xml, xmlwriter
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        shell: bash
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-composer-
            ${{ runner.os }}-composer-

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Run PHP-CS-Fixer
        run: vendor/bin/php-cs-fixer check

  phpstan:
    name: PHPStan (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.4'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, json, libxml, mbstring, xml, xmlwriter
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        shell: bash
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-composer-
            ${{ runner.os }}-composer-

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --error-format=github

  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }}) (OS ${{ matrix.os }}) (${{ matrix.dependencies }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        php:
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'
        dependencies:
          - highest
          - lowest
        exclude:
          - os: windows-latest
            dependencies: lowest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, json, libxml, mbstring, xml, xmlwriter
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        shell: bash
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-${{ matrix.dependencies }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-${{ matrix.dependencies }}-composer-
            ${{ runner.os }}-php-${{ matrix.php }}-composer-
            ${{ runner.os }}-composer-

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies (lowest)
        if: matrix.dependencies == 'lowest'
        run: composer update --prefer-lowest --prefer-stable --no-interaction --prefer-dist

      - name: Install dependencies (highest)
        if: matrix.dependencies == 'highest'
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Run PHPUnit with coverage
        shell: bash
        run: |
          set -o pipefail
          vendor/bin/phpunit --coverage-text --coverage-clover coverage.xml | tee coverage.txt

      - name: Upload coverage artifact
        if: matrix.dependencies == 'highest' && matrix.os == 'ubuntu-latest' && matrix.php == '8.4'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-php-${{ matrix.php }}-${{ matrix.dependencies }}
          path: |
            coverage.xml
            coverage.txt

      - name: Add coverage summary
        if: matrix.dependencies == 'highest' && matrix.os == 'ubuntu-latest' && matrix.php == '8.4'
        shell: bash
        run: |
          echo "## PHPUnit coverage (PHP ${{ matrix.php }}, OS ${{ matrix.os }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          sed -n '/Code Coverage Report:/,$p' coverage.txt >> "$GITHUB_STEP_SUMMARY"
