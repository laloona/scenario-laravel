name: Daily Dependency Check

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: ~

jobs:
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }}) (OS ${{ matrix.os }}) (OS ${{ matrix.branch }}) (${{ matrix.dependencies }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        branch:
          - 'main'
          - '1.0'
        php:
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'
        dependencies:
          - highest
          - lowest
        exclude:
          - os: windows-latest
            dependencies: lowest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, json, libxml, mbstring, xml, xmlwriter, fileinfo
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        shell: bash
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-branch-${{ matrix.branch }}-php-${{ matrix.php }}-${{ matrix.dependencies }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-branch-${{ matrix.branch }}-php-${{ matrix.php }}-${{ matrix.dependencies }}-composer-
            ${{ runner.os }}-branch-${{ matrix.branch }}-php-${{ matrix.php }}-composer-
            ${{ runner.os }}-branch-${{ matrix.branch }}-composer-
            ${{ runner.os }}-composer-

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies (lowest)
        if: matrix.dependencies == 'lowest'
        run: composer update --prefer-lowest --no-interaction --prefer-dist

      - name: Install dependencies (highest)
        if: matrix.dependencies == 'highest'
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Run PHPUnit
        run: vendor/bin/phpunit
